<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Timetable | DAMC ERP</title>
  <link rel="stylesheet" href="../assets/css/main.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    /* ── Timetable-specific styles ── */
    .tt-grid { display:flex; flex-direction:column; gap:0; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.1); }
    .tt-header { display:grid; grid-template-columns:140px 1fr 120px; background:var(--primary); color:#fff; padding:.75rem 1rem; font-weight:600; font-size:.85rem; }
    .tt-row { display:grid; grid-template-columns:140px 1fr 120px; padding:.75rem 1rem; border-bottom:1px solid var(--border); background:var(--card-bg); transition:.2s; align-items:center; }
    .tt-row:hover { background:var(--hover-bg,rgba(67,97,238,.06)); }
    .tt-row.empty-slot { opacity:.7; }
    .tt-time { font-weight:700; font-size:.85rem; color:var(--primary); }
    .tt-subject-name { font-weight:700; font-size:.95rem; margin-bottom:.25rem; }
    .tt-meta { display:flex; gap:.75rem; flex-wrap:wrap; font-size:.8rem; color:var(--text-muted); }
    .tt-type-badge { padding:.15rem .5rem; border-radius:20px; color:#fff; font-size:.75rem; font-weight:600; }
    .tt-actions-col { display:flex; gap:.4rem; justify-content:flex-end; }
    .tab-row { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1rem; }
    .tab-btn { padding:.4rem 1rem; border:2px solid var(--primary); border-radius:20px; background:transparent; color:var(--primary); cursor:pointer; font-weight:600; font-size:.82rem; transition:.2s; }
    .tab-btn.active, .tab-btn:hover { background:var(--primary); color:#fff; }
    .tt-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9999; align-items:center; justify-content:center; }
    .tt-modal-box { background:var(--card-bg); border-radius:16px; padding:2rem; width:90%; max-width:480px; box-shadow:0 10px 40px rgba(0,0,0,.3); }
    .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:600px){ .tt-header,.tt-row { grid-template-columns:100px 1fr 90px; } .form-row-2 { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div id="pageLoader" class="page-loader"><div class="loader-spinner"></div></div>
<div class="layout" id="appLayout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="../assets/images/logo.png" alt="DAMC" onerror="this.style.display='none'"/>
      <div><div class="brand-name">DAMC ERP</div><div class="brand-sub">College Management</div></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="students.html"><i class="fas fa-user-graduate"></i> Students</a>
      <a href="faculty.html"><i class="fas fa-chalkboard-teacher"></i> Faculty</a>
      <a href="attendance.html"><i class="fas fa-clipboard-check"></i> Attendance</a>
      <a href="timetable.html" class="active"><i class="fas fa-calendar-alt"></i> Timetable</a>
      <a href="exams.html"><i class="fas fa-file-alt"></i> Examinations</a>
      <a href="fees.html"><i class="fas fa-rupee-sign"></i> Fees</a>
      <a href="library.html"><i class="fas fa-book"></i> Library</a>
      <a href="hostel.html"><i class="fas fa-building"></i> Hostel</a>
      <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
    </nav>
    <div class="sidebar-footer">
      <small>Designed by Dr. Jadhav V R</small><br/>
      <small>📞 95183 56305</small>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <header class="topbar">
      <button class="sidebar-toggle" onclick="APP.toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1 class="page-title">📅 Timetable Management</h1>
      <div class="topbar-actions">
        <button class="btn btn-outline" onclick="TIMETABLE.exportCSV()">📥 Export CSV</button>
        <button class="btn btn-primary" onclick="TIMETABLE.openAdd()">➕ Add Class</button>
      </div>
    </header>

    <div class="content-body">

      <!-- Stats -->
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:1.5rem">
        <div class="stat-card"><div class="stat-value" id="ttTotalClasses">0</div><div class="stat-label">Total Classes</div></div>
        <div class="stat-card"><div class="stat-value" id="ttTheory">0</div><div class="stat-label">Theory</div></div>
        <div class="stat-card"><div class="stat-value" id="ttPractical">0</div><div class="stat-label">Practical</div></div>
        <div class="stat-card"><div class="stat-value" id="ttBreaks">0</div><div class="stat-label">Breaks</div></div>
      </div>

      <!-- Year tabs -->
      <div class="card" style="margin-bottom:1rem">
        <div class="card-header"><h3>🎓 Select Year</h3></div>
        <div class="card-body"><div class="tab-row" id="yearTabs"></div></div>
      </div>

      <!-- Day tabs -->
      <div class="card" style="margin-bottom:1rem">
        <div class="card-header"><h3>📆 Select Day</h3></div>
        <div class="card-body"><div class="tab-row" id="dayTabs"></div></div>
      </div>

      <!-- Grid -->
      <div class="card">
        <div class="card-body" id="timetableGrid">
          <p style="text-align:center;padding:2rem;color:var(--text-muted)">
            <i class="fas fa-spinner fa-spin"></i> Loading timetable...
          </p>
        </div>
      </div>

    </div><!-- /content-body -->
  </main>
</div>

<!-- Add/Edit Modal -->
<div class="tt-modal-overlay" id="ttModal">
  <div class="tt-modal-box">
    <h2 id="ttModalTitle" style="margin-bottom:1.2rem">Add Class</h2>
    <div class="form-row-2">
      <div class="form-group">
        <label>Year *</label>
        <select id="ttYear" class="form-control">
          <option>1st Year</option><option>2nd Year</option>
          <option>3rd Year</option><option>4th Year</option><option>Intern</option>
        </select>
      </div>
      <div class="form-group">
        <label>Day *</label>
        <select id="ttDay" class="form-control">
          <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
          <option>Thursday</option><option>Friday</option><option>Saturday</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label>Time Slot *</label>
        <select id="ttSlot" class="form-control">
          <option>08:00-09:00</option><option>09:00-10:00</option>
          <option>10:00-11:00</option><option>11:00-12:00</option>
          <option>12:00-13:00</option><option>13:00-14:00</option>
          <option>14:00-15:00</option><option>15:00-16:00</option>
        </select>
      </div>
      <div class="form-group">
        <label>Type *</label>
        <select id="ttType" class="form-control">
          <option>Theory</option><option>Practical</option><option>Tutorial</option>
          <option>Seminar</option><option>Clinical</option><option>Break</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Subject *</label>
      <input type="text" id="ttSubject" class="form-control" placeholder="e.g. Anatomy"/>
    </div>
    <div class="form-row-2">
      <div class="form-group">
        <label>Faculty</label>
        <input type="text" id="ttFaculty" class="form-control" placeholder="Dr. Name"/>
      </div>
      <div class="form-group">
        <label>Room / Lab</label>
        <input type="text" id="ttRoom" class="form-control" placeholder="Room 101"/>
      </div>
    </div>
    <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1.5rem">
      <button class="btn btn-outline" onclick="TIMETABLE.closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="TIMETABLE.saveEntry()">💾 Save</button>
    </div>
  </div>
</div>

<script src="../assets/js/db.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/backup.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/timetable.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof AUTH !== 'undefined') AUTH.checkLogin();
    if (typeof APP !== 'undefined') APP.init();
    setTimeout(() => {
      document.getElementById('pageLoader').style.display = 'none';
      TIMETABLE.init();
    }, 600);
  });
</script>
</body>
</html>
